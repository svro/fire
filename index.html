<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="titel"></title>
    <meta name="theme-color" content="#16332d">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/i18next/dist/umd/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend/i18nextHttpBackend.min.js"></script>
    <script src="https://unpkg.com/i18next-browser-languagedetector/i18nextBrowserLanguageDetector.min.js"></script>
    </head>
<body>
    <div class="container">
        <div class="app-toolbar">
            <div class="household-switcher" role="group" aria-label="Household mode">
                <div class="household-switcher-options">
                    <button type="button" class="household-option" data-household-mode="solo" data-i18n="householdModeSolo"></button>
                    <button type="button" class="household-option" data-household-mode="couple" data-i18n="householdModeCouple"></button>
                </div>
            </div>
            <div class="language-switcher" role="group" aria-label="Language switcher">
                <button type="button" class="language-option" data-language-option="nl">NL</button>
                <button type="button" class="language-option" data-language-option="en">EN</button>
                <button type="button" class="language-option" data-language-option="fr">FR</button>
                <button type="button" class="language-option" data-language-option="de">DE</button>
            </div>
        </div>
        <div class="main-content" id="mainContent">
            <div class="person1-panel">
                <details open> 
                <summary data-i18n="person1"></summary>
                <div class="slider-group-sameline">
                    <label for="currentAge1" data-i18n="currentAge1"></label>
                    <span class="value" id="currentAge1Value">25</span>
                    <input type="range" id="currentAge1" min="18" max="100" value="25" step="1">                    
                </div>                
                <div class="slider-group-sameline">
                    <label for="retirementAge1"  data-i18n="retirementAge1"></label>
                    <span class="value" id="retirementAge1Value">55</span>
                    <input type="range" id="retirementAge1" min="18" max="100" value="55" step="1">                     
                </div>
                
                <div class="slider-group-sameline">
                    <label for="endAge1" data-i18n="endAge1"></label>
                    <span class="value" id="endAge1Value">90</span>
                    <input type="range" id="endAge1" min="18" max="100" value="90" step="1">
                </div>
                <div class="slider-group-sameline">
                    <label for="pensionAge"  data-i18n="pensionAge1"></label>
                    <span class="value" id="pensionAgeValue">68</span>
                    <input type="range" id="pensionAge" min="50" max="100" value="68" step="1">                      
                </div>
                              
                <div class="slider-group-sameline">
                    <label for="monthlyPension" data-i18n="monthlyPension1"></label>
                    <span class="value" id="monthlyPensionValue">1.000</span><span data-i18n="everyMonth"></span>
                    <input type="range" id="monthlyPension" min="0" max="5000" value="1000" step="50">
                </div>
                </details>
            </div>
            <div class="chart-panel">
                <div class="chart-view-switcher" role="tablist" aria-label="Chart views">
                    <button type="button" class="chart-view-button is-active" data-chart-view="portfolio" data-i18n="chartTabPortfolio"></button>
                    <button type="button" class="chart-view-button" data-chart-view="cashflow" data-i18n="chartTabCashflow"></button>
                </div>
                <div class="chart-wrapper chart-wrapper--portfolio">
                    <div class="chart-card-header">
                        <div class="chart-card-heading">
                            <h3 class="chart-card-title" data-i18n="portfolioChartTitle"></h3>
                            <p class="chart-card-summary" id="portfolioChartSummary"></p>
                        </div>
                    </div>
                    <div class="chart-canvas-shell">
                        <canvas id="portfolioChart"></canvas>
                    </div>
                </div>
                <div class="chart-wrapper chart-wrapper--cashflow">
                    <div class="chart-card-header">
                        <div class="chart-card-heading">
                            <h3 class="chart-card-title" data-i18n="cashflowChartTitle"></h3>
                            <p class="chart-card-summary" id="cashflowChartSummary"></p>
                        </div>
                    </div>
                    <div class="chart-canvas-shell">
                        <canvas id="cashflowChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="person2-panel" id="person2Panel">
                <details open> 
                    <summary  data-i18n="person2"></summary>                
                <div class="slider-group-sameline">
                    <label for="currentAge2" data-i18n="currentAge1"></label>
                    <span class="value" id="currentAge2Value">23</span>
                    <input type="range" id="currentAge2" min="18" max="100" value="23" step="1">
                </div>
                
                <div class="slider-group-sameline">
                    <label for="retirementAge2" data-i18n="retirementAge1"></label>
                    <span class="value" id="retirementAge2Value">59</span>
                    <input type="range" id="retirementAge2" min="18" max="100" value="59" step="1">
                </div>
                
                <div class="slider-group-sameline">
                    <label for="endAge2" data-i18n="endAge1"></label>
                    <span class="value" id="endAge2Value">90</span>
                    <input type="range" id="endAge2" min="18" max="100" value="90" step="1">
                </div>
                <div class="slider-group-sameline">
                    <label for="pensionAge2" data-i18n="pensionAge1"></label>
                    <span class="value" id="pensionAge2Value">68</span>
                    <input type="range" id="pensionAge2" min="50" max="100" value="68" step="1">
                </div>
                
                <div class="slider-group-sameline">
                    <label for="monthlyPension2" data-i18n="monthlyPension1"></label>
                    <span class="value" id="monthlyPension2Value">1.000</span><span data-i18n="everyMonth"></span>
                    <input type="range" id="monthlyPension2" min="0" max="5000" value="1000" step="50">
                </div>
                </details>
            </div>
            <div class="settings-panel">
                <div class="common-panel">
                    <details open> 
                    <summary id="commonSettingsSummary" data-i18n="commonSettings"></summary>
                        <div class="slider-group-sameline">
                            <label for="currentAssets" data-i18n="currentAssets"></label>
                            <span class="value" id="currentAssetsValue">10.000</span>
                            <input type="range" id="currentAssets" min="0" max="1000000" value="10000" step="1000">
                                                        
                        </div>
                        <div class="slider-group-sameline">
                            <label for="portfolioReturns" data-i18n="portfolioReturns"></label>
                            <span class="value" id="portfolioReturnsValue">5.0</span>%
                            <input type="range" id="portfolioReturns" min="0" max="15" value="5" step="0.1">
                        </div>
                        <div class="slider-group-sameline">
                            <label for="annualContribution" id="annualContributionLabel" data-i18n="annualContribution2Work"></label>
                            <span class="value" id="annualContributionValue">12.000</span><span data-i18n="everyYear"></span>
                            <input type="range" id="annualContribution" min="0" max="200000" value="12000" step="1000">
                        </div>
                        <div class="slider-group-sameline" id="annualContribution2Row">
                            <label for="annualContribution2" data-i18n="annualContribution1Work"></label>
                            <span class="value" id="annualContribution2Value">6.000</span><span data-i18n="everyYear"></span>
                            <input type="range" id="annualContribution2" min="-100000" max="100000" value="6000" step="1000">
                        </div>
                        
                        <div class="slider-group-sameline">
                            <label for="annualSpending" id="annualSpendingLabel" data-i18n="annualContribution0Work"></label>
                            <span class="value" id="annualSpendingValue">40.000</span><span data-i18n="everyYear"></span>
                            <input type="range" id="annualSpending" min="0" max="200000" value="40000" step="1000">
                        </div>
                        <div class="slider-group-sameline">
                            <label for="inflation" data-i18n="inflation"> </label>
                            <span class="value" id="inflationValue">2.0</span>%
                            <input type="range" id="inflation" min="0" max="10" value="2" step="0.1">
                        </div>
                        <div class="slider-group-sameline">
                            <label for="showRealValues" data-i18n="showRealValues"></label>
                            <input type="checkbox" id="showRealValues" checked>
                        </div>
                        <div class="analysis-panel">
                            <div class="field-group">
                                <span class="field-label" data-i18n="analysisModeLabel"></span>
                                <select id="analysisMode">
                                    <option value="deterministic" data-i18n="analysisModeDeterministic"></option>
                                    <option value="monte-carlo" data-i18n="analysisModeMonteCarlo"></option>
                                    <option value="stress-bear" data-i18n="analysisModeStressBear"></option>
                                    <option value="stress-inflation" data-i18n="analysisModeStressInflation"></option>
                                    <option value="stress-extra-cost" data-i18n="analysisModeStressExtraCost"></option>
                                    <option value="stress-pension" data-i18n="analysisModeStressPension"></option>
                                </select>
                            </div>
                            <div class="analysis-advanced-settings" id="analysisAdvancedSettings">
                                <div class="slider-group-sameline">
                                    <label for="simulationCount" data-i18n="simulationCount"></label>
                                    <span class="value" id="simulationCountValue">500</span>
                                    <input type="range" id="simulationCount" min="250" max="1000" value="500" step="250">
                                </div>
                                <div class="slider-group-sameline">
                                    <label for="returnVolatility" data-i18n="returnVolatility"></label>
                                    <span class="value" id="returnVolatilityValue">12.0</span>%
                                    <input type="range" id="returnVolatility" min="4" max="25" value="12" step="0.5">
                                </div>
                                <div class="slider-group-sameline">
                                    <label for="inflationVolatility" data-i18n="inflationVolatility"></label>
                                    <span class="value" id="inflationVolatilityValue">1.0</span>%
                                    <input type="range" id="inflationVolatility" min="0" max="4" value="1" step="0.1">
                                </div>
                            </div>
                        </div>
                    </details>
                </div>
                <div class="extra-panel">
                    <details open> 
                        <summary data-i18n="extras"></summary>
                        <div class="extra-costs-toolbar">
                            <div class="extra-cost-preset-grid">
                                <button type="button" class="preset-button" data-extra-cost-preset="car" data-i18n="presetCar"></button>
                                <button type="button" class="preset-button" data-extra-cost-preset="studies" data-i18n="presetStudies"></button>
                                <button type="button" class="preset-button" data-extra-cost-preset="mortgage" data-i18n="presetMortgage"></button>
                                <button type="button" class="preset-button" data-extra-cost-preset="renovation" data-i18n="presetRenovation"></button>
                                <button type="button" class="preset-button" data-extra-cost-preset="healthcare" data-i18n="presetHealthcare"></button>
                                <button type="button" class="preset-button" data-extra-cost-preset="travel" data-i18n="presetTravel"></button>
                            </div>
                            <button type="button" class="secondary-action-button" id="addCustomCostButton" data-i18n="addCustomCost"></button>
                        </div>
                        <p class="extra-costs-empty" id="extraCostsEmptyState" data-i18n="extraCostsEmpty"></p>
                        <div class="extra-costs-list" id="extraCostsList"></div>
                    </details>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
